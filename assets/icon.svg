<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 32 32">
  <defs>
    <!-- Vertical gradient: yellow top → orange middle → fuchsia bottom -->
    <linearGradient id="sunGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffee00"/>
      <stop offset="50%" stop-color="#ff8c00"/>
      <stop offset="100%" stop-color="#ff00aa"/>
    </linearGradient>
  </defs>
  <!-- Sun circle -->
  <circle cx="16" cy="16" r="14" fill="url(#sunGrad)"/>
  <!-- Dumbbell: simplified (no small end plates) -->
  <!-- Center bar (shortened) -->
  <rect x="5" y="15" width="22" height="2" rx="1" fill="#1a0533"/>
  <!-- Left large plates -->
  <rect x="7" y="7" width="3" height="18" rx="1" fill="#1a0533"/>
  <rect x="10" y="7" width="3" height="18" rx="1" fill="#2a0a44"/>
  <!-- Right large plates -->
  <rect x="19" y="7" width="3" height="18" rx="1" fill="#2a0a44"/>
  <rect x="22" y="7" width="3" height="18" rx="1" fill="#1a0533"/>
</svg>
